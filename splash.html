<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photobooth IPH</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }

      .splash-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .logo-container {
        width: 96px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo {
        width: 96px;
        height: 96px;
        object-fit: contain;
      }

      .app-name {
        font-size: 24px;
        font-weight: 300;
        color: #e4e4e4;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      .app-version {
        font-size: 11px;
        color: #707070;
        letter-spacing: 1px;
        margin-top: -12px;
        text-transform: uppercase;
      }

      .progress-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        margin-top: 16px;
        width: 240px;
      }

      .progress-bar {
        width: 100%;
        height: 2px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 1px;
        overflow: hidden;
        position: relative;
      }

      .progress-fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #0078d4, #00bcf2);
        border-radius: 1px;
        transition: width 0.4s ease;
      }

      .status-text {
        font-size: 11px;
        color: #808080;
        letter-spacing: 0.5px;
        min-height: 14px;
        text-align: center;
        opacity: 0.8;
      }

      /* Fade out animation */
      .fade-out {
        animation: fadeOut 0.4s ease forwards;
      }

      @keyframes fadeOut {
        to {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="splash-container">
      <div class="logo-container">
        <img src="/src/assets/images/IPH.png" alt="IPH" class="logo" onerror="this.style.display='none'">
      </div>
      <div class="app-name">IPH Photobooth</div>
      <div class="app-version" id="version">Version Loading...</div>
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="status-text" id="status">Initializing...</div>
      </div>
    </div>

    <script type="module">
      document.getElementById('status').textContent = 'Loading...';

      // Use global Tauri API (withGlobalTauri: true in tauri.conf.json)
      // Bare imports like '@tauri-apps/api/core' only work in dev (Vite resolves them)
      // but fail silently in production builds where splash.html is a raw HTML file.
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;
      const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;

      const statusEl = document.getElementById('status');
      const progressFill = document.getElementById('progressFill');
      const versionEl = document.getElementById('version');
      const appWindow = getCurrentWebviewWindow();

      // Fetch version from Rust (non-blocking, don't await)
      invoke('get_app_version')
        .then(version => {
          if (versionEl) {
            versionEl.textContent = `Version ${version}`;
          }
        })
        .catch(e => {
          logger.error('[Splash] Failed to fetch version:', e);
          versionEl.textContent = 'v1.0.0'; // Fallback version
        });

      // Set up event listeners first
      let initComplete = false;

      try {
        const unlisten = await listen('init-progress', (event) => {
          const { step, total_steps, message } = event.payload;
          if (statusEl) {
            statusEl.textContent = message;
          }
          if (progressFill && step && total_steps) {
            const percent = Math.round((step / total_steps) * 100);
            progressFill.style.width = percent + '%';
          }
        });
        const unlistenComplete = await listen('init-complete', async () => {
          initComplete = true;
          if (unlisten) unlisten();
          if (unlistenComplete) unlistenComplete();

          // Fill progress to 100%
          if (progressFill) {
            progressFill.style.width = '100%';
          }
          if (statusEl) {
            statusEl.textContent = 'Ready';
          }

          // Fade out
          setTimeout(() => {
            document.body.classList.add('fade-out');
          }, 300);

          setTimeout(async () => {
            try {
              await invoke('close_splash_and_show_main');
            } catch (e) {
              logger.error('[Splash] Failed to transition:', e);
            }
          }, 700);
        });
      } catch (e) {
        logger.error('[Splash] Failed to set up listeners:', e);
      }

      // Force-close safety net (45 seconds max wait - must be longer than VM boot timeout of 30s)
      const forceCloseTimeout = setTimeout(async () => {
        if (!initComplete) {
          logger.warn('[Splash] Timeout - forcing app load');
          if (statusEl) statusEl.textContent = 'Loading app...';
          if (progressFill) progressFill.style.width = '100%';
          setTimeout(async () => {
            try {
              await invoke('close_splash_and_show_main');
            } catch (e) {
              logger.error('[Splash] Force close failed:', e);
              try {
                await appWindow.close();
              } catch (e2) {
                logger.error('[Splash] Could not close window:', e2);
              }
            }
          }, 500);
        }
      }, 45000); // Increased to 45 seconds (buffer over 30s VM boot timeout)

      statusEl.textContent = 'Initializing...';

      // Set a timeout to detect if invoke hangs
      let invokeCompleted = false;
      setTimeout(() => {
        if (!invokeCompleted) {
          logger.error('[Splash] invoke appears to be hanging (> 5s)');
          statusEl.textContent = 'Initializing (slow...)';
        }
      }, 5000);

      try {
        const result = await invoke('initialize_app');
        invokeCompleted = true;
        // Don't clear timeout - let init-complete event handle closing
      } catch (e) {
        invokeCompleted = true;
        logger.error('[Splash] initialize_app error:', e);
        statusEl.textContent = 'Init error: ' + e;
        // Don't clear timeout - force close will handle it
      }
    </script>
  </body>
</html>
